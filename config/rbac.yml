permissions:
  system.users.manage: "Manage user accounts"
  system.roles.manage: "View/manage roles and permissions"
  system.audit_logs.view: "View audit logs"
  app.members.invite: "Invite people to the organization"
  app.members.remove: "Remove members from the organization"
  app.members.promote: "Promote/demote members between admin and user"
  app.organization.manage: "Manage organization settings"
  app.billing.manage: "Manage billing and subscription (placeholder — no billing gem yet)"

roles:
  system:
    system_admin:
      permanent: true
      description: "Permanent platform operator role"
      permissions: [system.users.manage, system.roles.manage, system.audit_logs.view]
  app:
    owner:
      permanent: true
      description: "Organization owner — full control; cannot be removed while sole owner"
      permissions: [app.members.invite, app.members.remove, app.members.promote, app.organization.manage, app.billing.manage]
    admin:
      permanent: false
      description: "Organization admin — can invite and remove members"
      permissions: [app.members.invite, app.members.remove]
    user:
      permanent: false
      description: "Organization member — standard product access"
      permissions: []
